<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title and favicon -->
    <title>GitHub Issue Tracker | Sign In Page</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- Tailwind + DaisyUI link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css link  -->
    <link rel="stylesheet" href="./style/style.css">

    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

</head>

<body class=" bg-[#FFFFFF] mx-auto shadow-lg max-w-md min-h-screen my-10">
    <div>
        <div class="logo section text-center pt-5 space-y-2">
            <img class="mx-auto" src="./assets/github-logo.png" alt="github logo">
            <h2 class="text-2xl font-semibold">GitHub Issues Tracker</h2>
            <p class="text-neutral/50">Sign in to manage your issues</p>
        </div>
        <!-- form section start -->
        <div class="form  max-w-sm  mx-auto ">
            <div class="card-body">
                <fieldset class="fieldset">
                    <label class="label font-bold text-neutral">Username</label>
                    <input id="input-username" type="text" class="input rounded-lg w-full"
                        placeholder="Enter Username" />
                    <p class="text-[#4A00FF]">Default: admin</p>
                    <br>
                    <label class="label font-bold text-neutral">Password</label>
                    <input id="input-password" type="password" maxlength="8" class="input rounded-lg w-full"
                        placeholder="Enter Password" />
                    <p class="text-[#4A00FF]">Default: admin123</p>
                    <button id="signin-btn" class="btn btn-primary mt-4 rounded-lg font-semibold w-full">Sign In</button>
                </fieldset>
                <!-- divider -->
                <div class="divider">OR</div>
                <!-- last div -->
                <p class="text-neutral/50 text-center">Demo Credentials:</p>

                <div class="bg-base-200 py-5 text-center  rounded-lg">
                    <h2><span class="font-semibold">Username:</span>admin</h2>
                    <h2> <span class="font-semibold">Password: </span>admin123</h2>
                </div>
            </div>
        </div>
        <!-- login page form end -->
    </div>

    <script src="./script/login.js"></script>
</body>

</html>
