<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- title and favicon -->
    <title>GitHub Issue Tracker | Home Page</title>
    <link rel="shortcut icon" href="./assets/github-logo.png" type="image/x-icon">
    <!-- Tailwind + DaisyUI link -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- css link  -->
    <link rel="stylesheet" href="./style/style.css">

    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>

<body>
    <!-- header section start -->
    <header class="bg-base-100  shadow-sm">
        <div class="navbar w-11/12 mx-auto">
            <div class="navbar-start">
                <div class="dropdown">
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                        <div class="flex flex-col gap-3">
                            <!-- <input type="text"  placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" /> -->
                            <!-- search field start -->
                            <label class="input">
                                <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                    <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                        stroke="currentColor">
                                        <circle cx="11" cy="11" r="8"></circle>
                                        <path d="m21 21-4.3-4.3"></path>
                                    </g>
                                </svg>
                                <input type="search" placeholder="Search issues..." />
                            </label>
                            <!-- search field end -->

                            <!-- navbar button start -->
                            <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
                            <!-- navbar button end -->
                        </div>
                    </ul>
                </div>
                <!-- left side start -->
                <div class="flex-1 flex items-center gap-2">
                    <img class="w-8 h-8" src="./assets/github-logo.png" alt="logo">
                    <a class="font-semibold text-2xl">GitHub Issues Tracker</a>
                </div>
                <!-- left side end -->
            </div>
            <div class="navbar-end hidden lg:flex">
                <ul class="menu menu-horizontal px-1">

                    <div class="flex gap-3">
                        <!-- <input type="text"  placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" /> -->
                        <!-- search field start -->
                        <label class="input">
                            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                                <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                                    stroke="currentColor">
                                    <circle cx="11" cy="11" r="8"></circle>
                                    <path d="m21 21-4.3-4.3"></path>
                                </g>
                            </svg>
                            <input type="search" placeholder="Search issues..." />
                        </label>
                        <!-- search field end -->

                        <!-- navbar button start -->
                        <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
                        <!-- navbar button end -->
                    </div>
                </ul>
            </div>
        </div>
    </header>
    <!-- header section end -->

    <!-- tab section start -->
    <section class="bg-base-100  shadow-sm w-10/12 mx-auto mt-10 p-6 space-x-4 rounded-sm">
        <button id="btn-all" onclick=" toggleTab('all')" class="btn">All</button>
        <button id="btn-open" onclick="toggleTab('open')" class="btn">Open</button>
        <button id="btn-close" onclick="toggleTab('close')" class="btn">Closed</button>
    </section>
    <!-- tab section end -->

    <!-- issue count section start -->
    <section
        class="bg-base-100  shadow-sm w-10/12 mx-auto mt-5 p-6 flex flex-col gap-6 md:flex-row justify-between items-center rounded-sm ">
        <!-- left side start -->
        <div class="left-side flex flex-col md:flex-row gap-3 items-center text-center md:text-left">
            <img class="" src="./assets/Aperture.png" alt="aperture">
            <div>
                <h2 class="font-semibold"><span id="issue-count">0</span> Issues</h2>
                <p class="text-neutral/50">Track and manage your project issues</p>
            </div>
        </div>
        <!-- left side end -->

        <!-- right side start -->
        <div class="right-side flex gap-3 items-center">
            <div class="flex gap-1 items-center">
                <div class="w-3 h-3 rounded-full bg-[#00A96E]"></div>
                <p>Open</p>
            </div>
            <div class="flex gap-1 items-center">
                <div class="w-3 h-3 rounded-full bg-[#A855F7]"></div>
                <p>Closed</p>
            </div>
        </div>

        <!-- right side end -->


    </section>
    <!-- issue count section end -->

    <!-- card  section start -->
    <section id="card-container"
        class="bg-base-100  shadow-sm w-10/12 mx-auto  p-6 rounded-sm grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-2 hidden">

    </section>
    <!-- card  section end -->

    <!-- Open card section display  start-->
    <section id="open-card-container"
        class="bg-base-100 shadow-sm w-10/12 mx-auto rounded-sm grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 p-6 hidden">

       
    </section>
    <!--Open  card section display end -->

    <!-- close card section display start -->
    <section id="close-card-container" class="bg-base-100 shadow-sm w-10/12 mx-auto rounded-sm grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 p-6 hidden">

    </section>
    <!--Close  card section display  end -->

    


    <!-- javascript link -->
    <script src="./script/github.js"></script>
    <!-- <script src="./script/machine.js"></script> -->


</body>

</html>
